
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .sig-green { background: var(--color-background-success); color: var(--color-text-success); }
  .sig-amber { background: var(--color-background-warning); color: var(--color-text-warning); }
  .sig-red   { background: var(--color-background-danger);  color: var(--color-text-danger);  }
  input { font-family: 'IBM Plex Mono', monospace !important; font-size: 12px !important; }
</style>

<h2 class="sr-only">Recession Radar — US economic indicator dashboard tracking yield curve, jobless claims, PMI, consumer sentiment, and leading index with green/amber/red risk signals</h2>

<div id="root" style="padding:0 0 24px"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useCallback } = React;

const FRED = "https://api.stlouisfed.org/fred/series/observations";

const INDICATORS = [
  { id:"T10Y2Y", name:"Yield curve",       sub:"10Y − 2Y Treasury spread",   unit:"%", dp:2,
    sig:v=>v>0.25?"green":v>-0.25?"amber":"red",
    lbl:{green:"Positive",amber:"Flattening",red:"Inverted"},
    note:"Inversion has preceded every US recession since the 1970s." },
  { id:"ICSA",   name:"Jobless claims",    sub:"Weekly initial claims",       unit:"K",  dp:0, tx:v=>v/1000,
    sig:v=>v<220?"green":v<270?"amber":"red",
    lbl:{green:"Low",amber:"Elevated",red:"Surging"},
    note:"Sharp rises tend to lead broader unemployment by several weeks." },
  { id:"NAPM",   name:"Mfg. PMI",          sub:"ISM Manufacturing Index",     unit:"",   dp:1,
    sig:v=>v>52?"green":v>48?"amber":"red",
    lbl:{green:"Expanding",amber:"Neutral",red:"Contracting"},
    note:"Below 50 = contraction. Reads below 48 often precede recessions." },
  { id:"UMCSENT",name:"Consumer sentiment",sub:"U. of Michigan index",        unit:"",   dp:1,
    sig:v=>v>80?"green":v>65?"amber":"red",
    lbl:{green:"Confident",amber:"Cautious",red:"Pessimistic"},
    note:"Sentiment collapses reliably precede spending contractions." },
  { id:"USSLIND",name:"Leading index",     sub:"Conference Board LEI",        unit:"%",  dp:2,
    sig:v=>v>0.1?"green":v>-0.3?"amber":"red",
    lbl:{green:"Advancing",amber:"Slowing",red:"Declining"},
    note:"Six consecutive monthly declines have historically flagged recessions." },
];

const DEMO = { T10Y2Y:-0.12, ICSA:241500, NAPM:47.8, UMCSENT:68.2, USSLIND:-0.18 };

const HEX = { green:"#639922", amber:"#BA7517", red:"#E24B4A" };

function Gauge({ signals }) {
  const r2 = signals.filter(s=>s==="red").length;
  const a2 = signals.filter(s=>s==="amber").length;
  const n  = signals.length || 5;
  const score = Math.min(1, (r2*2 + a2) / (n*2));
  const angle = Math.PI * (1 - score);
  const CX=100, CY=88, R=68, NR=58;
  const nx = CX + NR*Math.cos(angle);
  const ny = CY - NR*Math.sin(angle);
  let label, hex;
  if(r2>=4){ label="High risk"; hex=HEX.red; }
  else if(r2>=2){ label="Elevated risk"; hex=HEX.amber; }
  else if(r2===1||a2>=3){ label="Moderate risk"; hex=HEX.amber; }
  else { label="Low risk"; hex=HEX.green; }

  return React.createElement("div",{style:{textAlign:"center"}},
    React.createElement("svg",{viewBox:"0 0 200 100",width:210,height:100},
      React.createElement("path",{d:"M 32 88 A 68 68 0 0 1 168 88",fill:"none",stroke:"var(--color-border-tertiary)",strokeWidth:10,strokeLinecap:"round"}),
      React.createElement("path",{d:"M 32 88 A 68 68 0 0 1 66 23",fill:"none",stroke:HEX.green,strokeWidth:10,strokeLinecap:"round",strokeOpacity:0.45}),
      React.createElement("path",{d:"M 66 23 A 68 68 0 0 1 134 23",fill:"none",stroke:HEX.amber,strokeWidth:10,strokeLinecap:"round",strokeOpacity:0.45}),
      React.createElement("path",{d:"M 134 23 A 68 68 0 0 1 168 88",fill:"none",stroke:HEX.red,strokeWidth:10,strokeLinecap:"round",strokeOpacity:0.45}),
      React.createElement("line",{x1:CX,y1:CY,x2:nx,y2:ny,stroke:hex,strokeWidth:2.5,strokeLinecap:"round"}),
      React.createElement("circle",{cx:CX,cy:CY,r:5,fill:hex}),
      React.createElement("circle",{cx:CX,cy:CY,r:3,fill:"var(--color-background-primary)"}),
      React.createElement("text",{x:22,y:98,fontSize:9,fill:"var(--color-text-secondary)",textAnchor:"middle",fontFamily:"IBM Plex Mono"},"LOW"),
      React.createElement("text",{x:178,y:98,fontSize:9,fill:"var(--color-text-secondary)",textAnchor:"middle",fontFamily:"IBM Plex Mono"},"HIGH"),
    ),
    React.createElement("div",{className:"mono",style:{fontSize:11,fontWeight:500,color:hex,letterSpacing:"0.07em",marginTop:2}},label.toUpperCase()),
  );
}

function Card({ ind, val }) {
  const dv = (ind.tx && val!==null) ? ind.tx(val) : val;
  const sig = (val!==null&&val!==undefined&&!isNaN(val)) ? ind.sig(dv) : null;
  const prefix = (ind.unit==="%"&&dv>=0) ? "+" : "";
  return React.createElement("div",{style:{
    background:"var(--color-background-primary)",
    border:"0.5px solid var(--color-border-tertiary)",
    borderRadius:"var(--border-radius-lg)",
    padding:"14px 16px",
    position:"relative",
    overflow:"hidden",
  }},
    sig && React.createElement("div",{style:{
      position:"absolute",top:0,left:0,bottom:0,width:3,
      background:HEX[sig],
      borderRadius:"var(--border-radius-lg) 0 0 var(--border-radius-lg)",
    }}),
    React.createElement("div",{style:{paddingLeft:sig?10:0}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
        React.createElement("div",{style:{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}},[ind.name]),
        sig && React.createElement("span",{className:`sig-${sig}`,style:{fontSize:10,padding:"2px 7px",borderRadius:999}},[ind.lbl[sig]]),
      ),
      React.createElement("div",{style:{fontSize:11,color:"var(--color-text-secondary)",marginBottom:8}},[ind.sub]),
      React.createElement("div",{className:"mono",style:{fontSize:26,fontWeight:500,color:sig?HEX[sig]:"var(--color-text-secondary)",marginBottom:6}},
        [val!==null&&val!==undefined&&!isNaN(val) ? `${prefix}${dv.toFixed(ind.dp)}${ind.unit}` : "—"]
      ),
      React.createElement("div",{style:{fontSize:11,color:"var(--color-text-secondary)",lineHeight:1.5}},[ind.note]),
    )
  );
}

function App() {
  const [key,setKey]=useState("");
  const [saved,setSaved]=useState("");
  const [vals,setVals]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [demo,setDemo]=useState(false);
  const [ts,setTs]=useState(null);

  const doFetch = useCallback(async k => {
    setLoading(true); setErr("");
    try {
      const res = await Promise.all(INDICATORS.map(async ind=>{
        const r = await fetch(`${FRED}?series_id=${ind.id}&api_key=${k}&sort_order=desc&limit=1&file_type=json`);
        const d = await r.json();
        if(d.error_message) throw new Error(d.error_message);
        const v = parseFloat(d.observations?.[0]?.value);
        return [ind.id, isNaN(v)?null:v];
      }));
      setVals(Object.fromEntries(res)); setDemo(false); setTs(new Date());
    } catch(e){ setErr(e.message||"Failed — check your API key."); }
    finally { setLoading(false); }
  },[]);

  const signals = vals ? INDICATORS.map(ind=>{
    const v=vals[ind.id]; if(v===null||v===undefined||isNaN(v)) return null;
    return ind.sig(ind.tx?ind.tx(v):v);
  }).filter(Boolean) : [];

  const headerStyle = {
    background:"var(--color-background-secondary)",
    borderBottom:"0.5px solid var(--color-border-tertiary)",
    padding:"12px 20px",
    display:"flex", justifyContent:"space-between", alignItems:"center",
    marginBottom:20,
  };

  return React.createElement("div",{style:{paddingBottom:24}},
    React.createElement("div",{style:headerStyle},
      React.createElement("div",null,
        React.createElement("div",{className:"mono",style:{fontSize:15,fontWeight:500,color:"var(--color-text-primary)",letterSpacing:"0.07em"}},["RECESSION RADAR"]),
        React.createElement("div",{className:"mono",style:{fontSize:10,color:"var(--color-text-secondary)"}},["US economic indicator monitor"]),
      ),
      ts && React.createElement("div",{className:"mono",style:{fontSize:10,color:"var(--color-text-secondary)",textAlign:"right"}},
        demo ? React.createElement("span",{style:{color:"var(--color-text-warning)",marginRight:8}},["● DEMO"]) : null,
        [ts.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})],
      ),
    ),
    React.createElement("div",{style:{padding:"0 20px"}},
      !vals && React.createElement("div",{style:{
        background:"var(--color-background-primary)",
        border:"0.5px solid var(--color-border-tertiary)",
        borderRadius:"var(--border-radius-lg)",
        padding:"24px", marginBottom:20, textAlign:"center",
      }},
        React.createElement("div",{style:{fontSize:14,fontWeight:500,color:"var(--color-text-primary)",marginBottom:6}},["Connect to live data"]),
        React.createElement("div",{style:{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16}},
          ["A free FRED API key from ",
          React.createElement("a",{href:"https://fred.stlouisfed.org/docs/api/api_key.html",style:{color:"var(--color-text-info)"}},["fred.stlouisfed.org"]),
          " — takes 2 minutes to get one."]
        ),
        React.createElement("div",{style:{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}},
          React.createElement("input",{value:key,onChange:e=>setKey(e.target.value),placeholder:"Paste API key here",
            style:{width:260},
            onKeyDown:e=>e.key==="Enter"&&key.trim()&&(setSaved(key.trim()),doFetch(key.trim()))}),
          React.createElement("button",{onClick:()=>{const k=key.trim();setSaved(k);doFetch(k);},disabled:!key.trim()||loading,
            style:{opacity:key.trim()?1:0.5}},loading?"Loading…":"Connect"),
          React.createElement("button",{onClick:()=>{setVals(DEMO);setDemo(true);setTs(new Date());}},["Demo data"]),
        ),
        err && React.createElement("div",{style:{color:"var(--color-text-danger)",fontSize:12,marginTop:10}},[err]),
      ),
      vals && React.createElement(React.Fragment,null,
        React.createElement("div",{style:{
          background:"var(--color-background-primary)",
          border:"0.5px solid var(--color-border-tertiary)",
          borderRadius:"var(--border-radius-lg)",
          padding:"20px 24px", marginBottom:16,
          display:"flex", alignItems:"center", gap:32, flexWrap:"wrap",
        }},
          React.createElement(Gauge,{signals}),
          React.createElement("div",{style:{flex:1,minWidth:160}},
            React.createElement("div",{className:"mono",style:{fontSize:10,color:"var(--color-text-secondary)",letterSpacing:"0.1em",marginBottom:10}},["SIGNAL BREAKDOWN"]),
            React.createElement("div",{style:{display:"flex",gap:24}},
              ["red","amber","green"].map(s=>React.createElement("div",{key:s,style:{textAlign:"center"}},
                React.createElement("div",{className:"mono",style:{fontSize:22,fontWeight:500,color:HEX[s]}},[signals.filter(x=>x===s).length]),
                React.createElement("div",{style:{fontSize:11,color:"var(--color-text-secondary)"}},[s==="red"?"alert":s==="amber"?"warning":"clear"]),
              ))
            ),
            React.createElement("div",{style:{marginTop:14,display:"flex",gap:8}},
              !demo && React.createElement("button",{onClick:()=>doFetch(saved),disabled:loading},[loading?"Refreshing…":"↻ Refresh"]),
              React.createElement("button",{onClick:()=>{setVals(null);setDemo(false);setKey("");setSaved("");}},
                demo?"Connect live data →":"Change key"),
            ),
          ),
        ),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:12}},
          INDICATORS.map(ind=>React.createElement(Card,{key:ind.id,ind,val:vals[ind.id]??null}))
        ),
        React.createElement("div",{className:"mono",style:{marginTop:16,fontSize:10,color:"var(--color-text-secondary)",textAlign:"center"}},
          ["Data: FRED, Federal Reserve Bank of St. Louis · Informational only — not financial advice"]
        ),
      ),
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
