<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recession Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#1B2A4A; --bg:#F4F5F7; --card:#FFFFFF; --border:#E2E4E9; --muted:#8892A4; --text:#1B2A4A;
      --green:#639922; --gbg:#EAF3DE; --gtxt:#3B6D11;
      --amber:#BA7517; --abg:#FAEEDA; --atxt:#854F0B;
      --red:#E24B4A;   --rbg:#FCEBEB; --rtxt:#791F1F;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { background:var(--navy); padding:18px 32px; display:flex; justify-content:space-between; align-items:center; }
    .header-title { font-family:'IBM Plex Mono',monospace; font-size:17px; font-weight:500; color:#fff; letter-spacing:0.08em; }
    .header-sub   { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#7A8FAD; margin-top:3px; letter-spacing:0.06em; }
    .header-ts    { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#7A8FAD; text-align:right; }
    .badge-live   { display:inline-block; background:rgba(99,153,34,0.2); color:#8BC34A; font-family:'IBM Plex Mono',monospace; font-size:9px; padding:2px 7px; border-radius:99px; margin-bottom:4px; letter-spacing:0.1em; }
    main { max-width:960px; margin:0 auto; padding:28px 24px 48px; }
    #status-screen { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:48px 28px; text-align:center; max-width:480px; margin:40px auto 0; }
    #status-screen h2 { font-size:16px; font-weight:600; color:var(--navy); margin-bottom:8px; }
    #status-screen p  { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:20px; }
    .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn { padding:10px 20px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; transition:opacity 0.15s; }
    .btn:active { opacity:0.8; }
    .btn-primary { background:var(--navy); color:#fff; }
    .error-box { background:var(--rbg); color:var(--rtxt); border-radius:8px; padding:9px 14px; font-size:12px; margin-top:12px; }
    #dashboard { display:none; }
    .agg-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:24px 28px; margin-bottom:18px; display:flex; align-items:center; gap:36px; flex-wrap:wrap; }
    .gauge-wrap { text-align:center; flex-shrink:0; }
    .gauge-label { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:0.08em; margin-top:4px; }
    .breakdown { flex:1; min-width:160px; }
    .breakdown-title { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.1em; margin-bottom:12px; }
    .breakdown-counts { display:flex; gap:24px; margin-bottom:16px; }
    .count-item { text-align:center; }
    .count-num { font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:500; }
    .count-lbl { font-size:11px; color:var(--muted); margin-top:1px; }
    .action-row { display:flex; gap:8px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
    .ind-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; position:relative; overflow:hidden; }
    .ind-accent { position:absolute; top:0; left:0; bottom:0; width:3px; }
    .ind-body { padding-left:10px; }
    .ind-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .ind-name { font-size:13px; font-weight:500; color:var(--text); }
    .ind-badge { font-size:10px; padding:2px 7px; border-radius:99px; }
    .ind-sub { font-size:11px; color:var(--muted); margin-bottom:9px; }
    .ind-value { font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:500; margin-bottom:7px; }
    .ind-note { font-size:11px; color:var(--muted); line-height:1.55; }
    footer { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); text-align:center; margin-top:28px; letter-spacing:0.04em; }
    @media (max-width:600px) { header { padding:14px 16px; } main { padding:16px 12px 40px; } }
  </style>
</head>
<body>
<header>
  <div>
    <div class="header-title">RECESSION RADAR</div>
    <div class="header-sub">US ECONOMIC INDICATOR MONITOR</div>
  </div>
  <div class="header-ts" id="ts-display" style="display:none">
    <div class="badge-live">● LIVE</div>
    <div id="ts-text"></div>
  </div>
</header>
<main>
  <div id="status-screen">
    <div class="spinner" id="spinner"></div>
    <h2 id="status-title">Loading data…</h2>
    <p id="status-msg">Fetching the latest US economic indicators.</p>
    <div id="err-box" class="error-box" style="display:none"></div>
    <button class="btn btn-primary" id="retry-btn" style="display:none" onclick="loadData()">Try again</button>
  </div>
  <div id="dashboard">
    <div class="agg-card">
      <div class="gauge-wrap">
        <svg viewBox="0 0 200 100" width="210" height="100">
          <path d="M 32 88 A 68 68 0 0 1 168 88" fill="none" stroke="#E2E4E9" stroke-width="10" stroke-linecap="round"/>
          <path d="M 32 88 A 68 68 0 0 1 66 23"  fill="none" stroke="#639922" stroke-width="10" stroke-linecap="round" stroke-opacity="0.4"/>
          <path d="M 66 23 A 68 68 0 0 1 134 23"  fill="none" stroke="#BA7517" stroke-width="10" stroke-linecap="round" stroke-opacity="0.4"/>
          <path d="M 134 23 A 68 68 0 0 1 168 88" fill="none" stroke="#E24B4A" stroke-width="10" stroke-linecap="round" stroke-opacity="0.4"/>
          <line id="needle-line" x1="100" y1="88" x2="100" y2="30" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round"/>
          <circle id="needle-hub" cx="100" cy="88" r="5" fill="#1B2A4A"/>
          <circle cx="100" cy="88" r="3" fill="white"/>
          <text x="22"  y="98" font-size="9" fill="#8892A4" text-anchor="middle" font-family="IBM Plex Mono">LOW</text>
          <text x="178" y="98" font-size="9" fill="#8892A4" text-anchor="middle" font-family="IBM Plex Mono">HIGH</text>
        </svg>
        <div class="gauge-label" id="gauge-label">—</div>
      </div>
      <div class="breakdown">
        <div class="breakdown-title">SIGNAL BREAKDOWN</div>
        <div class="breakdown-counts">
          <div class="count-item"><div class="count-num" id="count-red"   style="color:var(--red)">—</div><div class="count-lbl">alert</div></div>
          <div class="count-item"><div class="count-num" id="count-amber" style="color:var(--amber)">—</div><div class="count-lbl">warning</div></div>
          <div class="count-item"><div class="count-num" id="count-green" style="color:var(--green)">—</div><div class="count-lbl">clear</div></div>
        </div>
        <div class="action-row">
          <button class="btn btn-primary" id="refresh-btn" onclick="loadData()">↻ Refresh</button>
        </div>
      </div>
    </div>
    <div class="grid" id="cards-grid"></div>
    <footer>DATA: FRED (FEDERAL RESERVE BANK OF ST. LOUIS) &nbsp;·&nbsp; INFORMATIONAL ONLY — NOT FINANCIAL ADVICE</footer>
  </div>
</main>
<script>
  const INDICATORS = [
    { id:"T10Y2Y",  name:"Yield curve",       sub:"10Y − 2Y Treasury spread",  unit:"%", dp:2, sig:v=>v>0.25?"green":v>-0.25?"amber":"red", lbl:{green:"Positive",amber:"Flattening",red:"Inverted"},   note:"Inversion has preceded every US recession since the 1970s." },
    { id:"ICSA",    name:"Jobless claims",     sub:"Weekly initial claims",      unit:"K", dp:0, tx:v=>v/1000, sig:v=>v<220?"green":v<270?"amber":"red", lbl:{green:"Low",amber:"Elevated",red:"Surging"}, note:"Sharp rises tend to lead broader unemployment by several weeks." },
    { id:"UNRATE",  name:"Unemployment",       sub:"US unemployment rate",       unit:"%", dp:1, sig:v=>v<4.5?"green":v<5.5?"amber":"red", lbl:{green:"Low",amber:"Rising",red:"Elevated"},             note:"A rising unemployment rate is a classic recession confirmation signal." },
    { id:"UMCSENT", name:"Consumer sentiment", sub:"U. of Michigan index",       unit:"",  dp:1, sig:v=>v>80?"green":v>65?"amber":"red",   lbl:{green:"Confident",amber:"Cautious",red:"Pessimistic"},  note:"Sentiment collapses reliably precede spending contractions." },
    { id:"USSLIND", name:"Leading index",      sub:"Conference Board LEI",       unit:"%", dp:2, sig:v=>v>0.1?"green":v>-0.3?"amber":"red", lbl:{green:"Advancing",amber:"Slowing",red:"Declining"},    note:"Six consecutive monthly declines have historically flagged recessions." },
  ];
  const HEX = { green:"#639922", amber:"#BA7517", red:"#E24B4A" };
  const BGS = { green:"var(--gbg)", amber:"var(--abg)", red:"var(--rbg)" };
  const TXT = { green:"var(--gtxt)", amber:"var(--atxt)", red:"var(--rtxt)" };

  async function fetchSeries(id) {
    const r = await fetch(`/api/fred?series_id=${id}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (d.error_message) throw new Error(d.error_message);
    const raw = d.observations?.[0]?.value;
    if (!raw || raw === ".") return null;
    const v = parseFloat(raw);
    return isNaN(v) ? null : v;
  }

  async function loadData() {
    setStatus("loading");
    try {
      const results = await Promise.allSettled(INDICATORS.map(ind => fetchSeries(ind.id)));
      if (results.every(r => r.status === "rejected")) throw new Error(results[0].reason?.message || "All requests failed.");
      renderDashboard(results.map(r => r.status === "fulfilled" ? r.value : null));
    } catch(e) { setStatus("error", e.message); }
  }

  function setStatus(state, msg) {
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("status-screen").style.display = "block";
    if (state === "loading") {
      document.getElementById("spinner").style.display = "block";
      document.getElementById("status-title").textContent = "Loading data…";
      document.getElementById("status-msg").textContent = "Fetching the latest US economic indicators.";
      document.getElementById("err-box").style.display = "none";
      document.getElementById("retry-btn").style.display = "none";
    } else {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("status-title").textContent = "Could not load data";
      document.getElementById("status-msg").textContent = "Something went wrong fetching the indicators.";
      document.getElementById("err-box").textContent = msg || "Unknown error.";
      document.getElementById("err-box").style.display = "block";
      document.getElementById("retry-btn").style.display = "inline-block";
    }
  }

  function renderDashboard(values) {
    document.getElementById("status-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    const now = new Date();
    document.getElementById("ts-display").style.display = "block";
    document.getElementById("ts-text").textContent = now.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) + " " + now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    const signals = INDICATORS.map((ind,i) => { const v=values[i]; return (v!==null&&v!==undefined) ? ind.sig(ind.tx?ind.tx(v):v) : null; });
    updateGauge(signals.filter(Boolean));
    document.getElementById("count-red").textContent   = signals.filter(s=>s==="red").length;
    document.getElementById("count-amber").textContent = signals.filter(s=>s==="amber").length;
    document.getElementById("count-green").textContent = signals.filter(s=>s==="green").length;
    const grid = document.getElementById("cards-grid");
    grid.innerHTML = "";
    INDICATORS.forEach((ind,i) => {
      const v=values[i], dv=(v!==null&&v!==undefined&&ind.tx)?ind.tx(v):v;
      const sig=(v!==null&&v!==undefined)?ind.sig(dv):null;
      const prefix=(ind.unit==="%"&&dv!==null&&dv>=0)?"+":"";
      const valStr=(v!==null&&v!==undefined)?`${prefix}${dv.toFixed(ind.dp)}${ind.unit}`:"—";
      const card=document.createElement("div"); card.className="ind-card";
      card.innerHTML=`${sig?`<div class="ind-accent" style="background:${HEX[sig]}"></div>`:""}
        <div class="ind-body">
          <div class="ind-header"><span class="ind-name">${ind.name}</span>${sig?`<span class="ind-badge" style="background:${BGS[sig]};color:${TXT[sig]}">${ind.lbl[sig]}</span>`:""}</div>
          <div class="ind-sub">${ind.sub}</div>
          <div class="ind-value" style="color:${sig?HEX[sig]:"var(--muted)"}"> ${valStr}</div>
          <div class="ind-note">${ind.note}</div>
        </div>`;
      grid.appendChild(card);
    });
  }

  function updateGauge(signals) {
    const reds=signals.filter(s=>s==="red").length, ambs=signals.filter(s=>s==="amber").length, n=signals.length||5;
    const score=Math.min(1,(reds*2+ambs)/(n*2)), angle=Math.PI*(1-score);
    const nx=100+56*Math.cos(angle), ny=88-56*Math.sin(angle);
    let label,hex;
    if(reds>=4){label="HIGH RISK";hex=HEX.red;}
    else if(reds>=2){label="ELEVATED RISK";hex=HEX.amber;}
    else if(reds===1||ambs>=3){label="MODERATE RISK";hex=HEX.amber;}
    else{label="LOW RISK";hex=HEX.green;}
    document.getElementById("needle-line").setAttribute("x2",nx);
    document.getElementById("needle-line").setAttribute("y2",ny);
    document.getElementById("needle-line").setAttribute("stroke",hex);
    document.getElementById("needle-hub").setAttribute("fill",hex);
    document.getElementById("gauge-label").textContent=label;
    document.getElementById("gauge-label").style.color=hex;
  }

  loadData();
</script>
</body>
</html>
